id: MLS002
name: FTP brute-force attempt
description: Multiple FTP login failures from the same IP.
severity: high
enabled: true
schedule: "*/1 * * * *"
lookback: 5m
mql: 'protocol:ftp AND action:Login failed'
group_by: ip
threshold: 5
score: 30
tags: [brute-force, credential-access]
mitre: [T1110]
