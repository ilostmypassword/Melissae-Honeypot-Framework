id: MLS005
name: HTTP request burst (Web Scanning)
description: >
  Burst of HTTP requests from the same source (>=5 in 1 minute).
  Typical of automated scanners or fuzzers.
severity: low
enabled: true
schedule: "*/1 * * * *"
lookback: 1m
mql: 'protocol:http'
group_by: ip
threshold: 5
score: 10
tags: [recon, scan]
mitre: [T1595]
