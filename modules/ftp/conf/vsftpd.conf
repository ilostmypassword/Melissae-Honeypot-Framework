listen=YES
listen_ipv6=NO
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=000
dirmessage_enable=NO
connect_from_port_20=YES

# Log all FTP protocol commands (DELE, MKD, CWD, RNFR, RNTO, etc.)
xferlog_enable=YES
vsftpd_log_file=/var/log/vsftpd.log
log_ftp_protocol=YES

# Chroot the user to their home directory
chroot_local_user=YES
allow_writeable_chroot=YES
local_root=/home/vsftpd/ftpuser

pam_service_name=vsftpd
secure_chroot_dir=/var/run/vsftpd/empty

# Passive mode disabled (NAT-unfriendly for a honeypot)
pasv_enable=NO
