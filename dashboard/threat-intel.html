<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/threat-intel.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>

<canvas id="bee-bg"></canvas>

<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <img src="img/logo.png" alt="Logo Melissae" class="logo">
            <span>Melissae</span>
        </div>
        <div class="navbar-menu">
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="threat-intel.html" class="nav-item active">Threat Intelligence</a>
            <a href="search.html" class="nav-item">Search</a>
        </div>
    </div>
</nav>

<div class="threat-intel-container">

    <div class="stats-grid" id="threatStatsGrid"></div>

    <div id="killchainPanel" class="killchain hidden">
        <div class="killchain-header">
            <div>
                <p class="killchain-label">Killchain</p>
                <h3 id="killchainTitle">Select an IP in the list</h3>
            </div>
            <button id="killchainClose" class="killchain-close" aria-label="Fermer la killchain">×</button>
        </div>
        <div id="killchainContent" class="killchain-body">
            <div class="killchain-empty">No IP selected</div>
        </div>
    </div>

    <div class="malicious-list-container">
        <div class="malicious-header">
            <h3>Threat list</h3>
            <div class="malicious-actions">
                <div class="verdict-filter">
                    <label for="filterType">Filter by verdict</label>
                    <select id="filterType">
                        <option value="all">All</option>
                        <option value="benign">Benign</option>
                        <option value="suspicious">Suspicious</option>
                        <option value="malicious">Malicious</option>
                    </select>
                </div>
                <button id="exportStixButton" class="export-iocs-button">Export IoCs to STIX 2</button>
            </div>
        </div>
        <ul id="maliciousList"></ul>
    </div>

    <div class="chart-container">
        <h3>Threat Statistics</h3>
        <canvas id="threatChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/backgroundDisplay.js" defer></script>
<script src="js/threatintelDisplay.js" type="module"></script>

</body>
</html>
