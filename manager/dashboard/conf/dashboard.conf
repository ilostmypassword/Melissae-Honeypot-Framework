server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/manager.crt;
    ssl_certificate_key /etc/nginx/ssl/manager.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:DASH:10m;
    ssl_session_timeout 5m;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;

    location / {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /api/geoip {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        limit_req zone=geoip_limit burst=3 nodelay;
        proxy_pass http://melissae_api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        client_max_body_size 16k;
    }

    location /api/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        limit_req zone=dashboard_api burst=20 nodelay;
        proxy_pass http://melissae_api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        log_not_found off;
        access_log off;
    }
}

