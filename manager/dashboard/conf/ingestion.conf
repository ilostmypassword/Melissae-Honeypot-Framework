
server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/manager.crt;
    ssl_certificate_key /etc/nginx/ssl/manager.key;

    ssl_client_certificate /etc/nginx/ssl/ca.crt;
    ssl_verify_client optional;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:MTLS:10m;
    ssl_session_timeout 5m;

    server_tokens off;

    limit_req zone=agent_ingest burst=10 nodelay;

    location /api/enroll {
        proxy_pass http://melissae_api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-SSL-Client-CN $ssl_client_cn;
        client_max_body_size 64k;

        limit_req zone=enroll_limit burst=2 nodelay;
    }

    location /api/ingest {
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        proxy_pass http://melissae_api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-SSL-Client-CN $ssl_client_cn;
        proxy_hide_header X-Powered-By;
        client_max_body_size 5m;
    }

    location / {
        return 404;
    }
}

