
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    map $ssl_client_s_dn $ssl_client_cn {
        default           "";
        ~CN=(?<CN>[^,]+)  $CN;
    }

    limit_req_zone $ssl_client_cn zone=agent_ingest:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=enroll_limit:1m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=dashboard_api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=geoip_limit:1m rate=5r/m;

    include /etc/nginx/conf.d/dashboard.conf;
    include /etc/nginx/conf.d/ingestion.conf;
}

