services:

  melissae_apache1:
    build:
      context: ..
      dockerfile: modules/web/Dockerfile
    container_name: melissae_apache1
    restart: unless-stopped

  melissae_apache2:
    build:
      context: ..
      dockerfile: modules/web/Dockerfile
    container_name: melissae_apache2
    restart: unless-stopped

  melissae_proxy:
    image: nginx:latest
    container_name: melissae_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../modules/web/conf/proxy.conf:/etc/nginx/nginx.conf:ro
      - ./logs/web:/var/log/nginx
    depends_on:
      - melissae_apache1
      - melissae_apache2

  melissae_ftp:
    build:
      context: ..
      dockerfile: modules/ftp/Dockerfile
    container_name: melissae_ftp
    restart: unless-stopped
    ports:
      - "21:21"
    volumes:
      - ../modules/ftp/server:/home/vsftpd
      - ./logs/ftp:/var/log

  melissae_ssh:
    build:
      context: ..
      dockerfile: modules/ssh/Dockerfile
    container_name: melissae_ssh
    restart: unless-stopped
    hostname: ubuntu-server
    ports:
      - "22:22"
    volumes:
      - ./logs/ssh:/host-logs/ssh

  melissae_modbus:
    build:
      context: ..
      dockerfile: modules/modbus/Dockerfile
    container_name: melissae_modbus
    restart: unless-stopped
    ports:
      - "502:502"
    volumes:
      - ./logs/modbus:/host-logs/modbus

  melissae_mqtt:
    image: eclipse-mosquitto:latest
    container_name: melissae_mqtt
    restart: unless-stopped
    user: root
    entrypoint: /bin/sh
    command:
      - -c
      - |
        touch /mosquitto/log/mosquitto.log
        chown mosquitto:mosquitto /mosquitto/log/mosquitto.log
        exec su -s /bin/sh mosquitto -c "/usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    ports:
      - "1883:1883"
    volumes:
      - ../modules/mqtt/conf:/mosquitto/config:ro
      - ./logs/mqtt:/mosquitto/log

  melissae_telnet:
    build:
      context: ../modules/telnet
      dockerfile: Dockerfile
    container_name: melissae_telnet
    restart: unless-stopped
    hostname: ubuntu-server
    ports:
      - "23:23"
    volumes:
      - ./logs/telnet:/host-logs/telnet

  melissae_cve_2026_24061:
    build:
      context: ../modules/cve/CVE-2026-24061
      dockerfile: Dockerfile
    container_name: melissae_cve_2026_24061
    restart: unless-stopped
    ports:
      - "23:23"
    volumes:
      - ./logs/cve/CVE-2026-24061:/host-logs/telnet
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
      - /run:rw,noexec,nosuid,size=16m
      - /var/log:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=8m
      - /var/spool/rsyslog:rw,noexec,nosuid,size=8m
      - /var/lib/rsyslog:rw,noexec,nosuid,size=8m
      - /root:rw,noexec,nosuid,size=8m
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    networks:
      - cve_isolated
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0

  melissae_cve_2026_34197_broker:
    image: apache/activemq-classic:5.18.6
    container_name: melissae_cve_2026_34197_broker
    restart: unless-stopped
    environment:
      - ACTIVEMQ_WEB_ADMIN_PASSWORD=admin
    expose:
      - "8161"
    ports:
      - "61616:61616"
    volumes:
      - ./logs/cve/CVE-2026-34197/activemq-data:/opt/apache-activemq/data
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.0
    networks:
      - cve_isolated

  melissae_cve_2026_34197:
    build:
      context: ../modules/cve/CVE-2026-34197
      dockerfile: Dockerfile
    container_name: melissae_cve_2026_34197
    restart: unless-stopped
    ports:
      - "8161:8161"
    volumes:
      - ./logs/cve/CVE-2026-34197:/host-logs/activemq
    depends_on:
      - melissae_cve_2026_34197_broker
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
      - /var/cache/nginx:rw,nosuid,size=16m
      - /var/run:rw,nosuid,size=8m
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    networks:
      - cve_isolated

networks:
  cve_isolated:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.30.0.0/24
